# Ablation: SAME factored Double DQN as the shipped method, but target network
# OFF (target copied to online every step instead of every 1000). Isolates the
# delayed-target design choice on the method we actually ship.
env_config: configs/eval_standard.yaml
seed: 0
total_steps: 10000
buffer_size: 100000
batch_size: 128
gamma: 0.99
learning_rate: 0.0003
hidden: 128
learning_starts: 2000
train_every: 4
target_update_every: 1
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 8000
reward_scale: 10.0
eval_every: 5000
eval_seeds: [0, 1, 2]
teacher_config: configs/role_c_rollout.yaml
teacher_depth: 1
teacher_episodes: 30
teacher_pretrain_steps: 3000
teacher_batch_size: 128
teacher_learning_rate: 0.0003
log_path: logs/factored_double_dqn_notarget_seed{seed}.csv
weight_path: weights/factored_double_dqn_notarget_seed{seed}.pt
